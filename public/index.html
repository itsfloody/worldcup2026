function ukToNZ(dateStr, timeStr) {
  // UK local time in June = BST = UTC+1. NZ local time in June = NZST = UTC+12.
  // So NZ = UK time + 11 hours.
  const [y,m,d] = dateStr.split("-").map(Number);
  const [hh,mm] = timeStr.split(":").map(Number);
  // Build as UTC using UK's actual UTC offset (subtract 1h to get true UTC), then format will use browser's local zone.
  // Simpler: construct a UTC timestamp for the UK instant, then the browser (assumed NZ) will display it correctly
  // if we just add nothing - but artifact runs in user's browser which IS in NZ, so:
  const utcMs = Date.UTC(y, m-1, d, hh - 1, mm); // UK BST -> UTC
  return new Date(utcMs); // browser in NZ will render this in NZ local time automatically
}

  "Mexico":"🇲🇽","South Africa":"🇿🇦","South Korea":"🇰🇷","Czech Republic":"🇨🇿","Canada":"🇨🇦",
  "Bosnia & Herzegovina":"🇧🇦","USA":"🇺🇸","Paraguay":"🇵🇾","Qatar":"🇶🇦","Switzerland":"🇨🇭",

  "Germany":"🇩🇪","Curaçao":"🇨🇼","Netherlands":"🇳🇱","Japan":"🇯🇵","Ivory Coast":"🇨🇮","Ecuador":"🇪🇨",
  "Sweden":"🇸🇪","Tunisia":"🇹🇳","Spain":"🇪🇸","Cape Verde":"🇨🇻","Belgium":"🇧🇪","Egypt":"🇪🇬",
  "Saudi Arabia":"🇸🇦","Uruguay":"🇺🇾","Iran":"🇮🇷","New Zealand":"🇳🇿","France":"🇫🇷","Senegal":"🇸🇳",
  "Iraq":"🇮🇶","Norway":"🇳🇴","Argentina":"🇦🇷","Algeria":"🇩🇿","Austria":"🇦🇹","Jordan":"🇯🇴",
  "Portugal":"🇵🇹","DR Congo":"🇨🇩","England":"🏴","Croatia":"🇭🇷","Ghana":"🇬🇭","Panama":"🇵🇦",
  "Uzbekistan":"🇺🇿","Colombia":"🇨🇴"
};

let scores = {
  "Mexico|South Africa|2026-06-11": {
    homeScore: 2, awayScore: 0, status: "final",
    scorers: ["⚽ Quiñones 9'", "⚽ Jiménez 67'"],
    cards: ["🟨 Gutiérrez (MEX) 24'", "🟨 Mokoena (RSA) 30'", "🟥 Sithole (RSA) 51'", "🟥 Zwane (RSA) 82'", "🟥 Montes (MEX) 90+2'"]
  },
  "South Korea|Czech Republic|2026-06-12": {
    homeScore: 2, awayScore: 1, status: "final",
    scorers: ["⚽ Krejčí (CZE) 59'", "⚽ Hwang In-beom 67'", "⚽ Oh Hyeon-gyu 80'"],
    cards: ["🟨 Lee Gi-hyuk (KOR)"]
  },
  "Canada|Bosnia & Herzegovina|2026-06-12": {
    homeScore: 0, awayScore: 0, status: "final",
    scorers: [],
    cards: []
  }
};

// Map our team names to TheSportsDB naming where they differ
const tsdbNameMap = {
  "Bosnia & Herzegovina": "Bosnia and Herzegovina",
  "DR Congo": "DR Congo",
  "Ivory Coast": "Ivory Coast",
  "South Korea": "South Korea",
  "Czech Republic": "Czech Republic",
  "USA": "USA",
  "Cape Verde": "Cape Verde"
};
function tsdbName(team) { return tsdbNameMap[team] || team; }

async function autoFetchScores() {
  const status = document.getElementById('status');
  status.textContent = "Checking for live updates...";
  try {
    const res = await fetch("https://floodysworldcup2026.netlify.app/.netlify/functions/scores");
    if (!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    const events = json.events || [];

    let updated = 0;
    events.forEach(ev => {
      const home = ev.home, away = ev.away;
      const match = fixtures.find(f => {
        const fh = tsdbName(f[3]), fa = tsdbName(f[4]);
        return (fh === home && fa === away);
      });
      if (!match) return;
      const key = matchKey(match);
      if (ev.homeScore === null || ev.homeScore === undefined) return;
      const existing = scores[key] || {};
      scores[key] = {
        homeScore: parseInt(ev.homeScore),
        awayScore: parseInt(ev.awayScore),
        status: ev.status === "Match Finished" ? "final" : (ev.progress || "live"),
        scorers: existing.scorers || [],
        cards: existing.cards || []
      };
      updated++;
    });

    render();
    status.textContent = "Auto-updated " + new Date().toLocaleTimeString('en-NZ') + " · " + updated + " match(es) with scores";
  } catch (e) {
    status.textContent = "Auto-update unavailable (" + e.message + ") — showing manually entered results";
  }
}

function matchKey(f) { return f[3] + "|" + f[4] + "|" + f[0]; }

function render() {
  const content = document.getElementById('content');
  const filterVal = (document.getElementById('teamFilter').value || "").toLowerCase().trim();
  const groups = {};
  fixtures.forEach(f => {
    if (filterVal && !f[3].toLowerCase().includes(filterVal) && !f[4].toLowerCase().includes(filterVal)) return;
    const nzDate = ukToNZ(f[0], f[1]);
    const dayLabel = nzDate.toLocaleDateString('en-NZ', { weekday:'short', day:'numeric', month:'short' });
    (groups[dayLabel] = groups[dayLabel] || []).push({f, nzDate});
  });

  if (Object.keys(groups).length === 0) {
    content.innerHTML = '<div style="text-align:center; color:#9fb3d1; padding:30px;">No matches found for that team.</div>';
    return;
  }

  content.innerHTML = Object.entries(groups).map(([day, matches]) => `
    <div class="day">
      <h2>${day}</h2>
      ${matches.map(({f, nzDate}) => {
        const [date, , grp, home, away, venue] = f;
        const key = matchKey(f);
        const sc = scores[key];
        const timeStr = nzDate.toLocaleTimeString('en-NZ', { hour:'numeric', minute:'2-digit', hour12:true });
        let rightMeta = timeStr;
        let rightClass = "";
        let homeScore = "", awayScore = "";
        if (sc) {
          if (sc.status === "live") { rightMeta = sc.clock || "LIVE"; rightClass = "live"; }
          else if (sc.status === "final") { rightMeta = "FT"; rightClass = "final"; }
          homeScore = (sc.homeScore !== undefined && sc.homeScore !== null) ? sc.homeScore : "";
          awayScore = (sc.awayScore !== undefined && sc.awayScore !== null) ? sc.awayScore : "";
        }
        let detailsHtml = "";
        if (sc && (sc.scorers || sc.cards)) {
          const scorerLines = (sc.scorers || []).map(s => `<div class="line">${s}</div>`).join('');
          const cardLines = (sc.cards || []).map(c => `<div class="line">${c}</div>`).join('');
          detailsHtml = `<div class="match-details">${scorerLines}${cardLines}</div>`;
        }
        return `
        <div class="match" style="flex-wrap:wrap;">
          <div class="teams">
            <div class="team"><span class="tname"><span class="group-tag">${grp}</span>${flagMap[home]||''} ${home}</span><span class="score">${homeScore}</span></div>
            <div class="team"><span class="tname">${flagMap[away]||''} ${away}</span><span class="score">${awayScore}</span></div>
            <div class="venue">${venue}</div>
          </div>
          <div class="meta ${rightClass}">${rightMeta}</div>
          ${detailsHtml}
        </div>`;
      }).join('')}
    </div>
  `).join('');
}

// Returns true if we should be polling right now based on match kickoff times
function shouldPollNow() {
  const now = Date.now();
  return fixtures.some(f => {
    const key = matchKey(f);
    // Skip already-final matches
    if (scores[key] && scores[key].status === "final") return false;
    const kickoff = ukToNZ(f[0], f[1]).getTime();
    const minsElapsed = (now - kickoff) / 60000;
    // Half time window: 45+5 = 50mins to 45+20 = 65mins after kickoff
    const inHalfTime = minsElapsed >= 50 && minsElapsed <= 65;
    // Full time window: 90+10 = 100mins to 90+30 = 120mins after kickoff
    const inFullTime = minsElapsed >= 100 && minsElapsed <= 120;
    return inHalfTime || inFullTime;
  });
}

function scheduleNextCheck() {
  // Check every 60 seconds whether we're in a polling window
  setTimeout(() => {
    const status = document.getElementById('status');
    if (shouldPollNow()) {
      autoFetchScores();
    } else {
      // Work out next kickoff to tell the user when we'll next check
      const now = Date.now();
      const next = fixtures
        .filter(f => !(scores[matchKey(f)] && scores[matchKey(f)].status === "final"))
        .map(f => {
          const kickoff = ukToNZ(f[0], f[1]).getTime();
          const halfTimeWindow = kickoff + 50 * 60000;
          const fullTimeWindow = kickoff + 100 * 60000;
          return [halfTimeWindow, fullTimeWindow].filter(t => t > now);
        })
        .flat()
        .sort((a, b) => a - b)[0];

      if (next) {
        const minsUntil = Math.round((next - now) / 60000);
        status.textContent = "Next auto-check in ~" + minsUntil + " min" + (minsUntil !== 1 ? "s" : "");
      }
    }
    scheduleNextCheck();
  }, 60000);
}

document.getElementById('teamFilter').addEventListener('input', render);
document.getElementById('updateBtn').addEventListener('click', autoFetchScores);

render();
autoFetchScores();
scheduleNextCheck();
